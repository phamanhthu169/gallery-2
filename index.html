<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Gallery — 3D Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e0d4;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
  }

  canvas { display: block; width: 100% !important; height: 100% !important; }

  /* UI Overlay */
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  #header {
    position: absolute;
    top: 24px;
    left: 28px;
    pointer-events: none;
  }

  #header h1 {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c8b89a;
    font-weight: normal;
    opacity: 0.9;
  }

  #header p {
    font-size: 9px;
    letter-spacing: 0.12em;
    color: #6a5a48;
    margin-top: 4px;
  }

  #controls-hint {
    position: absolute;
    bottom: 24px;
    left: 28px;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #4a3e32;
    line-height: 1.8;
    text-transform: uppercase;
  }

  #controls-hint span {
    color: #7a6a58;
  }

  #loading {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.8s ease;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #loading-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #c8b89a;
    margin-bottom: 32px;
  }

  #loading-bar-wrap {
    width: 200px;
    height: 1px;
    background: #1e1a16;
  }

  #loading-bar {
    height: 1px;
    background: #c8b89a;
    width: 0%;
    transition: width 0.3s ease;
  }

  #loading-pct {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #4a3e32;
    margin-top: 12px;
  }

  #reset-btn {
    position: absolute;
    top: 24px;
    right: 28px;
    background: none;
    border: 1px solid #2a2018;
    color: #6a5a48;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    pointer-events: all;
    transition: color 0.2s, border-color 0.2s;
  }

  #reset-btn:hover {
    color: #c8b89a;
    border-color: #5a4a38;
  }

  #credit {
    position: absolute;
    bottom: 24px;
    right: 28px;
    font-size: 8px;
    letter-spacing: 0.1em;
    color: #2a2018;
    text-align: right;
    line-height: 1.6;
  }

  #credit a {
    color: #3a3028;
    text-decoration: none;
  }

  #credit a:hover { color: #6a5a48; }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-title">VR Gallery</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-pct">0%</div>
</div>

<div id="canvas-container"></div>

<div id="ui">
  <div id="header">
    <h1>VR Gallery</h1>
    <p>Maxim Mavrichev · CC-BY-4.0</p>
  </div>
  <button id="reset-btn" onclick="resetCamera()">Reset view</button>
  <div id="controls-hint">
    <span>Drag</span> — xoay &nbsp;·&nbsp; <span>Scroll</span> — zoom &nbsp;·&nbsp; <span>Right drag</span> — pan
  </div>
  <div id="credit">
    <a href="https://sketchfab.com/3d-models/vr-gallery-1e087aa25dc742e680accb15249bd6be" target="_blank">
      "VR Gallery" by Maxim Mavrichev<br>Licensed under CC-BY-4.0
    </a>
  </div>
</div>

<!-- Three.js r148 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GLTFLoader (r128 compatible, inline) ───────────────────────────────────
// Minimal GLTFLoader adapted for r128
(function(){
  const _taskCache = new WeakMap();

  class GLTFLoader extends THREE.Loader {
    constructor(manager) { super(manager); this.dracoLoader = null; this.ktx2Loader = null; this.meshoptDecoder = null; this.pluginCallbacks = []; }
    load(url, onLoad, onProgress, onError) {
      const scope = this;
      const resourcePath = THREE.LoaderUtils ? THREE.LoaderUtils.extractUrlBase(url) : url.slice(0, url.lastIndexOf('/') + 1);
      this.manager.itemStart(url);
      const _onError = (e) => { if (onError) { onError(e); } else { console.error(e); } scope.manager.itemError(url); scope.manager.itemEnd(url); };
      new THREE.FileLoader(scope.manager).setPath(scope.path).setResponseType('arraybuffer').setRequestHeader(scope.requestHeader).setWithCredentials(scope.withCredentials).load(url, (data) => {
        try { scope.parse(data, resourcePath, (gltf) => { onLoad(gltf); scope.manager.itemEnd(url); }, _onError); }
        catch(e) { _onError(e); }
      }, onProgress, _onError);
    }
    parse(data, path, onLoad, onError) {
      let content;
      const extensions = {};
      const plugins = {};
      if (typeof data === 'string') { content = data; }
      else {
        const magic = THREE.LoaderUtils ? THREE.LoaderUtils.decodeText(new Uint8Array(data, 0, 4)) : new TextDecoder().decode(new Uint8Array(data, 0, 4));
        if (magic === 'glTF') { /* GLB */ onError(new Error('GLB not supported in this minimal loader — use .gltf + .bin')); return; }
        else { content = THREE.LoaderUtils ? THREE.LoaderUtils.decodeText(new Uint8Array(data)) : new TextDecoder().decode(new Uint8Array(data)); }
      }
      const json = JSON.parse(content);
      if (json.asset === undefined || json.asset.version[0] < 2) { onError(new Error('Unsupported glTF version')); return; }
      const parser = new GLTFParser(json, { path, crossOrigin: this.crossOrigin, requestHeader: this.requestHeader, manager: this.manager });
      parser.fileLoader.setRequestHeader(this.requestHeader);
      parser.parse(onLoad, onError);
    }
  }

  const WEBGL_COMPONENT_TYPES = { 5120: Int8Array, 5121: Uint8Array, 5122: Int16Array, 5123: Uint16Array, 5125: Uint32Array, 5126: Float32Array };
  const WEBGL_TYPE_SIZES = { SCALAR: 1, VEC2: 2, VEC3: 3, VEC4: 4, MAT2: 4, MAT3: 9, MAT4: 16 };

  class GLTFParser {
    constructor(json, options) {
      this.json = json || {};
      this.options = options || {};
      this.cache = { add(){}, get(){ return undefined; }, remove(){} };
      this.associations = new Map();
      this.primitiveCache = {};
      this.pendingRequests = {};
      this.fileLoader = new THREE.FileLoader(options.manager);
      this.fileLoader.setResponseType('arraybuffer');
      this.textureLoader = new THREE.TextureLoader(options.manager);
      this.textureLoader.setCrossOrigin(options.crossOrigin || 'anonymous');
    }

    parse(onLoad, onError) {
      const json = this.json;
      Promise.all([
        this.loadBuffers(),
        this.loadTextures()
      ]).then(([buffers, textures]) => {
        this.buffers = buffers;
        this.textures = textures;
        const scene = this.buildScene(json.scenes[json.scene || 0]);
        onLoad({ scene, scenes: [scene], cameras: [], animations: [], asset: json.asset });
      }).catch(onError);
    }

    loadBuffers() {
      const json = this.json;
      if (!json.buffers) return Promise.resolve([]);
      return Promise.all(json.buffers.map(buf => {
        if (!buf.uri) return Promise.resolve(new ArrayBuffer(0));
        return new Promise((res, rej) => {
          this.fileLoader.setPath(this.options.path).load(buf.uri, res, undefined, rej);
        });
      }));
    }

    loadTextures() {
      const json = this.json;
      if (!json.images) return Promise.resolve([]);
      return Promise.all(json.images.map(img => {
        return new Promise((res) => {
          const url = this.options.path + img.uri;
          const tex = this.textureLoader.load(url, res, undefined, () => res(null));
          tex.flipY = false;
          tex.colorSpace = THREE.SRGBColorSpace !== undefined ? THREE.SRGBColorSpace : 3001;
        }).then(() => {
          const tex = this.textureLoader.load(this.options.path + img.uri);
          tex.flipY = false;
          if (THREE.SRGBColorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;
          return tex;
        });
      }));
    }

    getAccessor(index) {
      const json = this.json;
      const acc = json.accessors[index];
      const bv = json.bufferViews[acc.bufferView];
      const buf = this.buffers[bv.buffer];
      const TypedArray = WEBGL_COMPONENT_TYPES[acc.componentType];
      const size = WEBGL_TYPE_SIZES[acc.type];
      const byteOffset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
      const count = acc.count;
      const stride = bv.byteStride;
      if (stride && stride !== size * TypedArray.BYTES_PER_ELEMENT) {
        // Interleaved — copy out
        const out = new TypedArray(count * size);
        const src = new TypedArray(buf, (bv.byteOffset || 0), bv.byteLength / TypedArray.BYTES_PER_ELEMENT);
        const elemStride = stride / TypedArray.BYTES_PER_ELEMENT;
        const elemOffset = (acc.byteOffset || 0) / TypedArray.BYTES_PER_ELEMENT;
        for (let i = 0; i < count; i++) {
          for (let j = 0; j < size; j++) out[i * size + j] = src[elemOffset + i * elemStride + j];
        }
        return out;
      }
      return new TypedArray(buf, byteOffset, count * size);
    }

    buildScene(sceneDef) {
      const group = new THREE.Group();
      group.name = sceneDef.name || 'Scene';
      (sceneDef.nodes || []).forEach(nodeIdx => group.add(this.buildNode(nodeIdx)));
      return group;
    }

    buildNode(nodeIdx) {
      const json = this.json;
      const nodeDef = json.nodes[nodeIdx];
      const obj = new THREE.Group();
      obj.name = nodeDef.name || '';
      if (nodeDef.matrix) {
        obj.matrix.fromArray(nodeDef.matrix);
        obj.matrix.decompose(obj.position, obj.quaternion, obj.scale);
      } else {
        if (nodeDef.translation) obj.position.fromArray(nodeDef.translation);
        if (nodeDef.rotation) obj.quaternion.fromArray(nodeDef.rotation);
        if (nodeDef.scale) obj.scale.fromArray(nodeDef.scale);
      }
      if (nodeDef.mesh !== undefined) obj.add(this.buildMesh(nodeDef.mesh));
      (nodeDef.children || []).forEach(c => obj.add(this.buildNode(c)));
      return obj;
    }

    buildMesh(meshIdx) {
      const json = this.json;
      const meshDef = json.meshes[meshIdx];
      const group = new THREE.Group();
      meshDef.primitives.forEach(prim => {
        const positions = this.getAccessor(prim.attributes.POSITION);
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        if (prim.attributes.NORMAL !== undefined) {
          geometry.setAttribute('normal', new THREE.BufferAttribute(this.getAccessor(prim.attributes.NORMAL), 3));
        }
        if (prim.attributes.TEXCOORD_0 !== undefined) {
          geometry.setAttribute('uv', new THREE.BufferAttribute(this.getAccessor(prim.attributes.TEXCOORD_0), 2));
        }
        if (prim.indices !== undefined) {
          const idx = this.getAccessor(prim.indices);
          geometry.setIndex(new THREE.BufferAttribute(idx, 1));
        }
        geometry.computeBoundingBox();

        let material;
        if (prim.material !== undefined) {
          const matDef = json.materials[prim.material];
          const isUnlit = matDef.extensions && matDef.extensions.KHR_materials_unlit;

          // Base color texture
          let map = null;
          if (matDef.pbrMetallicRoughness && matDef.pbrMetallicRoughness.baseColorTexture) {
            const texIdx = json.textures ? json.textures[matDef.pbrMetallicRoughness.baseColorTexture.index].source : matDef.pbrMetallicRoughness.baseColorTexture.index;
            map = this.textures[texIdx] || this.textures[matDef.pbrMetallicRoughness.baseColorTexture.index];
          }

          // Emissive texture
          let emissiveMap = null;
          if (matDef.emissiveTexture) {
            const texIdx = json.textures ? json.textures[matDef.emissiveTexture.index].source : matDef.emissiveTexture.index;
            emissiveMap = this.textures[texIdx] || this.textures[matDef.emissiveTexture.index];
          }

          if (isUnlit) {
            // KHR_materials_unlit: use MeshBasicMaterial — no lighting influence
            material = new THREE.MeshBasicMaterial({ map: map || null });
          } else {
            material = new THREE.MeshStandardMaterial({
              map: map || null,
              emissiveMap: emissiveMap || null,
              emissive: matDef.emissiveFactor ? new THREE.Color(...matDef.emissiveFactor) : new THREE.Color(0,0,0),
              metalness: matDef.pbrMetallicRoughness?.metallicFactor || 0,
              roughness: matDef.pbrMetallicRoughness?.roughnessFactor !== undefined ? matDef.pbrMetallicRoughness.roughnessFactor : 1,
            });
          }
          material.name = matDef.name || '';
          material.side = THREE.FrontSide;
        } else {
          material = new THREE.MeshBasicMaterial();
        }

        group.add(new THREE.Mesh(geometry, material));
      });
      return group;
    }
  }

  window.GLTFLoader = GLTFLoader;
})();

// ─── Scene setup ─────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.NoToneMapping; // baked texture — no tone mapping
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0b09);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 200);
camera.position.set(0, 3, 8);

// ─── Orbit Controls (inline, minimal) ────────────────────────────────────────
let isDragging = false, isRightDrag = false;
let lastX = 0, lastY = 0;
let spherical = { theta: 0, phi: Math.PI / 3, r: 8 };
let target = new THREE.Vector3(0, 0.5, 0);
const defaultSpherical = { theta: 0, phi: Math.PI / 3, r: 8 };
const defaultTarget = new THREE.Vector3(0, 0.5, 0);

function updateCamera() {
  spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, spherical.phi));
  spherical.r = Math.max(1, Math.min(30, spherical.r));
  camera.position.set(
    target.x + spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    target.y + spherical.r * Math.cos(spherical.phi),
    target.z + spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  );
  camera.lookAt(target);
}

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true; isRightDrag = e.button === 2;
  lastX = e.clientX; lastY = e.clientY;
});
renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (isRightDrag) {
    const panSpeed = spherical.r * 0.001;
    const right = new THREE.Vector3();
    camera.getWorldDirection(right);
    const up = new THREE.Vector3(0, 1, 0);
    right.cross(up).normalize();
    target.addScaledVector(right, -dx * panSpeed);
    target.addScaledVector(up, dy * panSpeed);
  } else {
    spherical.theta -= dx * 0.005;
    spherical.phi -= dy * 0.005;
  }
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  spherical.r *= (1 + e.deltaY * 0.001);
  updateCamera();
}, { passive: true });

// Touch support
let lastTouchDist = null;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
  if (e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    spherical.theta -= dx * 0.005; spherical.phi -= dy * 0.005;
    updateCamera();
  }
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist) { spherical.r *= lastTouchDist / d; updateCamera(); }
    lastTouchDist = d;
  }
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => { isDragging = false; lastTouchDist = null; });

window.resetCamera = function() {
  spherical.theta = defaultSpherical.theta;
  spherical.phi = defaultSpherical.phi;
  spherical.r = defaultSpherical.r;
  target.copy(defaultTarget);
  updateCamera();
};

// ─── Load model ──────────────────────────────────────────────────────────────
const loader = new GLTFLoader();
const loadingEl = document.getElementById('loading');
const barEl = document.getElementById('loading-bar');
const pctEl = document.getElementById('loading-pct');

loader.load(
  'scene.gltf',
  (gltf) => {
    scene.add(gltf.scene);

    // Center model
    const box = new THREE.Box3().setFromObject(gltf.scene);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    gltf.scene.position.sub(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    spherical.r = maxDim * 1.5;
    defaultSpherical.r = spherical.r;
    target.set(0, 0, 0);
    defaultTarget.set(0, 0, 0);
    updateCamera();

    barEl.style.width = '100%';
    pctEl.textContent = '100%';
    setTimeout(() => loadingEl.classList.add('hidden'), 400);
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      barEl.style.width = pct + '%';
      pctEl.textContent = pct + '%';
    }
  },
  (error) => {
    pctEl.textContent = 'Lỗi: ' + error.message;
    console.error(error);
  }
);

updateCamera();

// ─── Render loop ─────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
